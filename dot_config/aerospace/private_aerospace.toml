# System Settings is non-resizable (Ventura+); float it in place so a permission prompt pops centered here instead of teleporting the view. center-window.sh sets coords since aerospace can't position floats.
[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = [
   'layout floating',
   'exec-and-forget ~/.config/aerospace/center-window.sh "System Settings"',
]

[[on-window-detected]]
if.app-id = 'net.imput.helium'
run = "move-node-to-workspace B"


[workspace-to-monitor-force-assignment]
# Profile: desk — full 3-monitor desk setup.
# 1 = HP Z27n (Left), 2 = Center monitor, 3 = Laptop built-in.
# Spliced into aerospace.toml's [workspace-to-monitor-force-assignment]
# by `aerospace-profile`.
A = 3
B = 3
C = 3
D = 3
E = 1
F = 3
G = 3
K = 3
L = 3
M = 3
Q = 1
R = 3
S = 3
T = 3
U = 3
V = 3
W = 1
X = 3
Z = 1
