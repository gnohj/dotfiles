[default_session]
preview_command = "eza --all --git --icons --color=always {}"
# Trailing ; exec $SHELL keeps pane alive (sesh < PR#372 workaround)
startup_command = "~/.config/sesh/startup.sh {} >/dev/null 2>&1; exec $SHELL"

[[session]]
name = "home"
path = "~/"
startup_command = "c; exec $SHELL"

[[session]]
name = "bin"
path = "~/_bin"
startup_command = "ls; exec $SHELL"

[[session]]
name = "config"
path = "~/.config"
startup_command = "n; exec $SHELL"

[[session]]
name = "logs"
path = "~/.logs"

[[session]]
name = "chezmoi"
path = "~/.local/share/chezmoi"
startup_command = "git status; exec $SHELL"

[[session]]
name = "developer"
path = "~/Developer"
startup_command = "ls; exec $SHELL"

[[session]]
name = "downloads"
path = "~/Downloads"
startup_command = "ls; exec $SHELL"

[[session]]
name = "desktop"
path = "~/Desktop"
startup_command = "ls; exec $SHELL"

[[session]]
name = "inferno/bare"
path = "~/Developer/inferno/"
startup_command = "treekanga tui; exec $SHELL"

[[session]]
name = "inferno/review"
path = "~/Developer/inferno/review"
startup_command = "ghd; exec $SHELL"

[[session]]
name = "second_brain"
path = "~/Obsidian/second-brain"

[[session]]
name = "glove80"
path = "~/Developer/glove80"

[[session]]
name = "corne42"
path = "~/Developer/corne42"

[[session]]
name = "toucan_corne42"
path = "~/Developer/toucan-corne42"

[[session]]
name = "web/bare"
path = "~/Developer/web/"
startup_command = "treekanga tui; exec $SHELL"

[[session]]
name = "web/review"
path = "~/Developer/web/review"
startup_command = "ghd; exec $SHELL"

[[session]]
name = "yazi"
path = "~/."
startup_command = "y; exec $SHELL"

[[session]]
name = "radioctl"
path = "~/."
startup_command = "n .radioctl2; exec $SHELL"
preview_command = "bat --language=bash --style=snip --color=always ~/.radioctl2"

[[session]]
name = "radioctl_cmd"
path = "~/.zsh_radioctl_cmds"
startup_command = "n .zsh_radioctl_cmds; exec $SHELL"
preview_command = "bat --language=bash --style=snip --color=always ~/.zsh_radioctl_cmds"


[[session]]
name = "claude"
path = "~/.claude"

[[session]]
name = "opencode"
path = "~/.config/opencode"

[[session]]
name = "recon"
path = "~/Developer/recon"

[[session]]
name = "gnohj-monorepo"
path = "~/Developer/gnohj-monorepo"

[[session]]
name = "feed"
path = "~/Developer/feed"

[[session]]
name = "GhosttyFetch"
path = "~/Developer/GhosttyFetch"

[[session]]
name = "actions"
path = "~/Developer/actions"

[[session]]
name = "sre-iam-management"
path = "~/Developer/sre-iam-management"

[[session]]
name = "zsh_gnohj_env"
path = "~/.zsh_gnohj_env"
startup_command = "n .zsh_gnohj_env; exec $SHELL"
preview_command = "bat --language=bash --style=snip --color=always ~/.zsh_gnohj_env"
