# kitty quick-access (quake) terminal — YAZI variant
# https://sw.kovidgoyal.net/kitty/kittens/quick-access-terminal/
#
# A SECOND, independent quake dedicated to yazi. Toggled by a global hotkey
# (skhd: cmd+ctrl+k). Distinct from the general kitty quake (cmd+ctrl+s) via
# `--instance-group yazi` — the two never share a window. Plain kitty with NO
# tmux/herdr in front, so the kitty graphics protocol (yazi image previews)
# works end-to-end here, unlike inside the herdr stack.
#
# This file is passed explicitly with `--config`, so it does NOT inherit the
# general quick-access-terminal.conf — everything the yazi quake needs lives
# here, merged onto kitty's builtin quick-access defaults.

# Match the ghostty quake geometry: top edge, full width, ~35% screen height —
# same as the general kitty quake. `edge top` docks a full-width panel to the top
# (columns ignored for horizontal panels); height set by `lines`. kitty's `lines`
# has NO percentage support (count or `Npx` only), so 370px (~26% of the 2560x1440
# primary/external display). Fixed px, so it won't auto-adapt across displays
# like ghostty's `35%` — retune the px value if the built-in becomes primary.
edge top
lines 370px

# Auto-hide when you click away / focus another app (popup dismiss behavior).
hide_on_focus_loss yes

# Bare Escape hides the quake (chosen for consistency across all three quakes).
# TRADEOFF: Escape no longer reaches yazi — it's eaten to hide the window, so
# yazi loses Esc (cancel / clear selection / leave visual mode). Use `q` to quit
# yazi (also closes the window). Switch this back to `cmd+escape` if you want
# Esc to stay with yazi.
kitty_override map escape hide_macos_app

# Slightly more opaque than the main window so overlaid text stays readable.
background_opacity 0.95
