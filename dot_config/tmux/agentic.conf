# ─── tmux agentic.conf ──────────────────────────────────────────────────────
# The AI-agent / tmux-dash layer, sourced by tmux.conf AFTER base.conf (so its
# C-h override wins over vim-tmux-navigator's default installed by tpm in base).
# native.conf omits this file; herdr.conf never touches it.
#
# Contains: agent-status pane-border chips, the sesh fast-nvim session hook,
# the gh-dash/treehouse worktree sweep, the Claude-prompt jump, and the
# tmux-dash sidebar-aware C-h.

# Turn the top border into a label bar: a pane-identity chip pinned left, the
# agent-activity label pinned right. `#[align=right]` opens the right-justified
# half, so the two ends stay glued to the pane edges at any width.
#
# The whole label is guarded by `#{?#{@agent_status},…,}` so it renders ONLY on
# agent panes (the ones tmux-dash tags). Non-agent panes (plain shells, editors)
# have no @agent_status, so their label is empty - a clean, bare border line.
# (pane-border-status itself is a per-WINDOW option, so the border-status row
# still exists on those panes; only its text is blanked.)
#
# All colors come from `#{@chip_*}` user options set by generate-tmux-colors.sh
# from the active palette, so the pills follow the colorscheme (no hardcoded
# hexes). Formats resolve at draw time, so the vars being set later is fine.
#
# Left carries `index · label · command` as a "pill" (middot separator). The index is
# `#{pane_index}` shown as-is (NOT pane_index+1): pane-base-index is 1 (base.conf), so
# panes are already 1-based and match tmux's own numbering - adding 1 would start at 2. The active pane
# gets a filled accent-green pill (@chip_green bg, @chip_dark text); inactive
# panes dim the bg to muted gray (@chip_gray) but keep the text green - present,
# not gone, matching the inactive right pill's colored-text treatment.
#
# Right is a filled pill reading `@agent_status`. Its color MIRRORS the sidebar's
# per-status theme (state::load_theme): working=@chip_working (blue),
# idle=@chip_idle (orange), input=@chip_input (red), new=@chip_new (aqua),
# limit=@chip_input (red). Active panes fill the pill (dark text on the status
# color); inactive panes dim the bg to gray but keep the status word in its status
# color, so a background pane flipping to input is still spottable. The trailing
# dot (active ●, inactive ○) is tinted the same per-status color as the pill, so
# it reads as a status glyph too. (Non-agent panes never reach here - the outer
# @agent_status guard blanks the whole label.)
#
# A copy (📋) / zoom (🔍) mode pill rides the right end of the ACTIVE pane's
# border, before the status pill. It lives here (on the pane's own title line)
# rather than in the border COLOR because a border-style format can't tint a
# middle pane's shared vertical dividers — they resolve against the not-in-copy
# neighbour, so the tint only ever reached the top line and window edges (see
# generate-tmux-colors.sh). The pill is OUTSIDE the @agent_status guard, so it
# also shows on plain shells in copy/zoom. Both states use @chip_copy (magenta).
#
# Escaping note: a comma inside `#[fg=…,bg=…]` that sits *inside* a `#{?…}`
# conditional must be written `#,` or tmux mis-splits the conditional branches.
set -g pane-border-status top
set -g pane-border-format "#[align=left]#{?#{@agent_status}, #{?pane_active,#[fg=#{@chip_dark}#,bg=#{@chip_green}],#[fg=#{@chip_green}#,bg=#{@chip_gray}]} #{pane_index} · #{?#{@agent_label},#{@agent_label} · ,}#{?#{@agent_harness},#{@agent_harness},#{pane_current_command}} #[default],}#[align=right]#{?pane_active,#{?@resize_mode,#[fg=#{@chip_dark}#,bg=#{@chip_resize}] ⤢ #[default] ,#{?pane_in_mode,#[fg=#{@chip_dark}#,bg=#{@chip_copy}] 📋 #[default] ,#{?window_zoomed_flag,#[fg=#{@chip_dark}#,bg=#{@chip_copy}] 🔍 #[default] ,}}},}#{?#{@agent_status},#{?pane_active,#{?#{==:#{@agent_status},working},#[fg=#{@chip_dark}#,bg=#{@chip_working}],#{?#{==:#{@agent_status},input},#[fg=#{@chip_dark}#,bg=#{@chip_input}],#{?#{==:#{@agent_status},idle},#[fg=#{@chip_dark}#,bg=#{@chip_idle}],#{?#{==:#{@agent_status},new},#[fg=#{@chip_dark}#,bg=#{@chip_new}],#{?#{==:#{@agent_status},limit},#[fg=#{@chip_dark}#,bg=#{@chip_done}],#[fg=#{@chip_dark}#,bg=#{@chip_done}]}}}}} #{@agent_status} #[default],#{?#{==:#{@agent_status},working},#[fg=#{@chip_working}#,bg=#{@chip_gray}],#{?#{==:#{@agent_status},input},#[fg=#{@chip_input}#,bg=#{@chip_gray}],#{?#{==:#{@agent_status},idle},#[fg=#{@chip_idle}#,bg=#{@chip_gray}],#{?#{==:#{@agent_status},new},#[fg=#{@chip_new}#,bg=#{@chip_gray}],#{?#{==:#{@agent_status},limit},#[fg=#{@chip_done}#,bg=#{@chip_gray}],#[fg=#{@chip_done}#,bg=#{@chip_gray}]}}}}} #{@agent_status} #[default]}  #{?#{==:#{@agent_status},working},#[fg=#{@chip_working}],#{?#{==:#{@agent_status},input},#[fg=#{@chip_input}],#{?#{==:#{@agent_status},idle},#[fg=#{@chip_idle}],#{?#{==:#{@agent_status},new},#[fg=#{@chip_new}],#{?#{==:#{@agent_status},limit},#[fg=#{@chip_done}],#[fg=#{@chip_done}]}}}}}#{?pane_active,●,○} ,}"

# Fast nvim for git-repo SESH sessions. The handler is gated on a fresh
# @sesh_spawn stamp (set by every sesh entry point right before `sesh connect`),
# so a manual `tmux new-session` never triggers it. Overrides base.conf's
# rename-only session-created hook (one -g hook, not -ga, so re-sourcing stays
# idempotent) to append the fast-nvim launcher.
set-hook -g session-created 'run-shell "sleep 0.1 && bash ~/.config/tmux/initial-window-setup.sh" ; run-shell -b "~/.config/tmux/sesh-session-created.sh #{hook_session_name}"'

# Auto-release of treehouse PR-review worktree slots on window close is DISABLED.
# It fired `sweep` on EVERY window-unlinked and, on a single momentary read of
# tmux state, ran `treehouse return --force` (which terminates the worktree's
# live processes). Under churn (repeated gh-dash `P`, sesh session create/destroy)
# tmux's window/pane listing intermittently drops the review windows, so a sweep
# catching that blink killed live reviews — even with grace + window-name +
# two-strike guards, a late/racy window creation still lost. Release is now
# MANUAL: the gh-dash `R` binding runs `review-worktree.sh release <pr>`, and
# `review-worktree.sh sweep` can still be run by hand to reclaim idle slots.
# set-hook -g window-unlinked 'run-shell -b "~/.config/gh-dash/review-worktree.sh sweep || true"'

# Jump to the last user prompt in a Claude Code chat. Searches backward
# for "❯ " (Claude's rendered user-message bullet — same chevron char as
# starship's shell prompt, but in a Claude pane the chat content is the
# only source). Lands in copy-mode at the match; hit `q`/`esc` to exit,
# or `?❯ ` then `n` to step back through earlier prompts.
# Lowercase `u` because tpm hardcodes uppercase `U` for plugin updates.
bind u copy-mode \; \
  send -X cursor-up \; \
  send -X search-backward "❯ " \; \
  display-message "💬 Jumped to last user prompt (q to exit)"

# C-h: nvim/fzf → passthrough; leftmost non-nvim pane → focus tmux-dash sidebar; else select-pane -L. Loads after tpm so it wins over vim-tmux-navigator's default. C-\ keeps the plugin default.
bind-key -n C-h if-shell -F "#{m/ri:^(view|l?n?vim?x?|fzf)(diff)?$,#{pane_current_command}}" \
  { send-keys C-h } \
  { if-shell -F '#{pane_at_left}' \
      { run-shell "pkill -USR1 -x tmux-dash || true" } \
      { select-pane -L } }

# C-j/C-k/C-l: same native pane_current_command check as C-h, replacing vim-tmux-navigator's ps|grep default (a per-keypress sh+ps+grep fork whose latency climbs with process count).
bind-key -n C-j if-shell -F "#{m/ri:^(view|l?n?vim?x?|fzf)(diff)?$,#{pane_current_command}}" \
  { send-keys C-j } { select-pane -D }
bind-key -n C-k if-shell -F "#{m/ri:^(view|l?n?vim?x?|fzf)(diff)?$,#{pane_current_command}}" \
  { send-keys C-k } { select-pane -U }
bind-key -n C-l if-shell -F "#{m/ri:^(view|l?n?vim?x?|fzf)(diff)?$,#{pane_current_command}}" \
  { send-keys C-l } { select-pane -R }
