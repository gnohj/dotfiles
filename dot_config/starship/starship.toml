
# Starship prompt - https://starship.rs (auto-generated by colorscheme-set.sh)
"$schema" = 'https://starship.rs/config-schema.json'
add_newline = false
format = '''
$directory$cmd_duration[❯](bold #b7ce97) 
'''
right_format = ""
# [username]
# style_user = "green bold"
# style_root = "red bold"
# format = "[$user]($style) "
# disabled = false
# show_always = false
[directory]
read_only = " "
truncation_length = 10
truncate_to_repo = true       # truncates directory to root folder if in github repo
style = "bold italic #a3b8c6"
[git_branch]
style = "bold #dc988e"
[package]
display_private = true
[cmd_duration]
min_time = 4000
show_milliseconds = false
disabled = false
format = '[$duration ](bold italic #b7ce97)'
[git_status]
disabled = true
[git_commit]
disabled = true
