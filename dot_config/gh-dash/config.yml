#
# GitHub PR / issue dashboard in your terminal
# Auto-generated gh-dash config
# https://github.com/dlvhdr/gh-dash
prSections:
  - title: My Pull Requests
    filters: is:open author:@me
  - title: Needs My Review
    filters: is:open review-requested:@me
  - title: Involved
    filters: is:open involves:@me -author:@me
  - title: All Open (web)
    filters: is:open repo:iheartradio/web
    limit: 20
  - title: All Open (inferno)
    filters: is:open repo:iheartradio/inferno-monorepo
    limit: 20
issuesSections:
  - title: My Issues
    filters: is:open author:@me
  - title: Assigned
    filters: is:open assignee:@me
  - title: Involved
    filters: is:open involves:@me -author:@me
defaults:
  preview:
    open: true
    width: 100
  prsLimit: 20
  issuesLimit: 20
  view: prs
  layout:
    prs:
      updatedAt:
        width: 7
      repo:
        width: 15
      author:
        width: 15
      assignees:
        width: 20
        hidden: true
      base:
        width: 15
        hidden: true
      lines:
        width: 16
    issues:
      updatedAt:
        width: 7
      repo:
        width: 15
      creator:
        width: 10
      assignees:
        width: 20
        hidden: true
  refetchIntervalMinutes: 30
keybindings:
  issues:
    - key: e
      name: ЁЯРЩ Edit issue in Octo (new tmux window)
      command: >
        tmux new-window -n "ЁЯРЩ Issue #{{.IssueNumber}}" -c {{.RepoPath}} 'nvim --cmd "let g:zen_disabled=1" -c ":silent Octo issue edit {{.IssueNumber}}"'
    - key: i
      name: ЁЯРЩ Create issue in Octo (tmux popup)
      command: >
        tmux display-popup -d {{.RepoPath}} -w 80% -h 90% -E 'nvim --cmd "let g:zen_disabled=1" -c ":silent Octo issue create"'
  prs:
    - key: P # Open PR in Neovim Octo, Diff, Claude Review, and ENHANCE
      name: ЁЯдЦ Review PR тАФ Octo + CodeDiff + Claude /review + ENHANCE
      command: >
        cd {{.RepoPath}} &&
        BASE=$(gh pr view {{.PrNumber}} --json baseRefName -q .baseRefName) &&
        HEAD=$(gh pr view {{.PrNumber}} --json headRefName -q .headRefName) &&
        git fetch origin $BASE $HEAD 2>/dev/null &&
        git checkout review/$HEAD 2>/dev/null || git checkout -b review/$HEAD origin/$HEAD &&
        MERGE_BASE=$(git merge-base origin/$BASE origin/$HEAD) &&
        tmux new-window -n "ЁЯРЩ #{{.PrNumber}}" -c {{.RepoPath}} 'nvim --cmd "let g:zen_disabled=1" -c ":silent Octo pr edit {{.PrNumber}}"' &&
        tmux new-window -n "ЁЯФА #{{.PrNumber}}" -c {{.RepoPath}} "nvim --cmd 'let g:zen_disabled=1' -c \":silent CodeDiff $MERGE_BASE origin/$HEAD\"" &&
        tmux new-window -n "ЁЯдЦ #{{.PrNumber}}" -c {{.RepoPath}} '/opt/homebrew/bin/claude --dangerously-skip-permissions "/review {{.PrNumber}}"' &&
        tmux new-window -n "тЬи #{{.PrNumber}}" -c {{.RepoPath}} 'ENHANCE_THEME=iceberg_dark gh-enhance -R {{.RepoName}} {{.PrNumber}}'
    - key: W # Open PR in Neovim Octo with Workspaces
      name: ЁЯМ│ Workspace PR тАФ Octo + CodeDiff + Claude (checkout branch)
      command: >
        cd {{.RepoPath}} &&
        BASE=$(gh pr view {{.PrNumber}} --json baseRefName -q .baseRefName) &&
        HEAD=$(gh pr view {{.PrNumber}} --json headRefName -q .headRefName) &&
        git fetch origin $BASE $HEAD 2>/dev/null &&
        git checkout $HEAD 2>/dev/null || git checkout -b $HEAD origin/$HEAD &&
        MERGE_BASE=$(git merge-base origin/$BASE origin/$HEAD) &&
        tmux new-window -n "ЁЯРЩ #{{.PrNumber}}" -c {{.RepoPath}} 'nvim --cmd "let g:zen_disabled=1" -c ":silent Octo pr edit {{.PrNumber}}"' &&
        tmux new-window -n "ЁЯФА #{{.PrNumber}}" -c {{.RepoPath}} "nvim --cmd 'let g:zen_disabled=1' -c \":silent CodeDiff $MERGE_BASE origin/$HEAD\"" &&
        tmux new-window -n "ЁЯдЦ #{{.PrNumber}}" -c {{.RepoPath}} '/opt/homebrew/bin/claude --dangerously-skip-permissions "/review {{.PrNumber}}"'
    - key: enter # Open PR in Neovim Octo
      name: ЁЯРЩ Open PR in Octo (review branch)
      command: >
        cd {{.RepoPath}} &&
        HEAD=$(gh pr view {{.PrNumber}} --json headRefName -q .headRefName) &&
        git fetch origin $HEAD 2>/dev/null &&
        git checkout review/$HEAD 2>/dev/null || git checkout -b review/$HEAD origin/$HEAD &&
        tmux new-window -n "ЁЯРЩ #{{.PrNumber}}" -c {{.RepoPath}} 'nvim --cmd "let g:zen_disabled=1" -c ":silent Octo pr edit {{.PrNumber}}"'
    - key: D # Open PR Diff in Neovim CodeDiff
      name: ЁЯФА Open PR Diff in CodeDiff
      command: >
        cd {{.RepoPath}} &&
        BASE=$(gh pr view {{.PrNumber}} --json baseRefName -q .baseRefName) &&
        HEAD=$(gh pr view {{.PrNumber}} --json headRefName -q .headRefName) &&
        git fetch origin $BASE $HEAD 2>/dev/null &&
        git checkout review/$HEAD 2>/dev/null || git checkout -b review/$HEAD origin/$HEAD &&
        MERGE_BASE=$(git merge-base origin/$BASE origin/$HEAD) &&
        tmux new-window -n "ЁЯФА #{{.PrNumber}}" -c {{.RepoPath}} "nvim --cmd 'let g:zen_disabled=1' -c \":silent CodeDiff $MERGE_BASE origin/$HEAD\""
    - key: C # Open PR checks in ENHANCE
      name: тЬи Open PR checks in ENHANCE
      command: >
        cd {{.RepoPath}} &&
        tmux new-window -n "тЬи #{{.PrNumber}}" -c {{.RepoPath}} 'ENHANCE_THEME=iceberg_dark gh-enhance -R {{.RepoName}} {{.PrNumber}}'
    - key: A # Open PR in Claude Review
      name: ЁЯдЦ Run Claude /review on PR
      command: >
        cd {{.RepoPath}} &&
        HEAD=$(gh pr view {{.PrNumber}} --json headRefName -q .headRefName) &&
        git fetch origin $HEAD 2>/dev/null &&
        git checkout review/$HEAD 2>/dev/null || git checkout -b review/$HEAD origin/$HEAD &&
        tmux new-window -n "ЁЯдЦ #{{.PrNumber}}" -c {{.RepoPath}} '/opt/homebrew/bin/claude --dangerously-skip-permissions "/review {{.PrNumber}}"'
repoPaths:
  gnohj/*: ~/Developer/*
  iheartradio/*: ~/Developer/*
  iheartradio/inferno-monorepo: ~/Developer/inferno/review/
  iheartradio/web: ~/Developer/web/review/
theme:
  ui:
    table:
      showSeparator: true
      compact: false
  colors:
    text:
      primary: "#b8c9d3"
      secondary: "#a3b8c6"
      inverted: "#0f1419"
      faint: "#9fb7a4"
      warning: "#dab183"
      success: "#b7ce97"
      error: "#da858e"
    background:
      selected: "#536571"
    border:
      primary: "#a3b8c6"
      secondary: "#536571"
      faint: "#40474b"
pager:
  diff: ""
