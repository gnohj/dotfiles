# herdr — https://herdr.dev/docs/configuration/
# Deploys to macOS and Linux (harmless on the Mac if herdr is also used locally).

# Suppress the first-run orientation/onboarding screen. herdr shows it whenever
# this key is missing OR true; false dismisses it for good.
onboarding = false

[keys]
# ctrl+a matches the tmux prefix muscle memory. The `th` wrapper tmux runs with
# `prefix None` + `unbind C-a`, so ctrl+a passes straight through to herdr here.
# Note: herdr can't distinguish left vs right ctrl (the terminal collapses both),
# so left-ctrl+a also triggers this and shadows shell readline ctrl+a.
prefix = "ctrl+a"

# Sequential pane walk within the tab. ASYMMETRIC on purpose:
# ctrl+shift+tab is NOT hijacked by ghostty/kitty, so it arrives as a real shift+tab key and
# matches prefix+shift+tab (herdr's default). ctrl+tab IS hijacked, and a raw 0x09 Tab byte is
# indistinguishable from ctrl+i, so it can't match prefix+tab - the hijack sends `prefix o`
# instead. prefix+o is free because open_notification_target is unbound below.
cycle_pane_next = "prefix+o"
cycle_pane_previous = "prefix+shift+tab"

# ctrl+b → previous pane in the CURRENT TAB (see the [[keys.command]] below). Not
# herdr's native last_pane: that one is global and leaks across workspaces/tabs.

# Sidebar toggle, relocated off its default prefix+b to prefix+B.
toggle_sidebar = "prefix+shift+b"

# prefix+a cycles through ALL agents in sidebar order (herdr's native next_agent) -
# a browse-the-queue walk regardless of state. Distinct from prefix+i below, which
# jumps only to blocked agents. prefix+A (shift+a) walks the same list backwards.
next_agent = "prefix+a"
previous_agent = "prefix+shift+a"

# prefix+w cycles forward through spaces/workspaces; prefix+W (shift+w) cycles back -
# mirrors the prefix+a / prefix+A agent pair. Moved off prefix+s so settings can go
# back to its herdr default there (below). prefix+w was herdr's native workspace_picker,
# unused here since the ctrl+t picker (herdr-sesh.sh) covers picking.
next_workspace = "prefix+w"
previous_workspace = "prefix+shift+w"

# prefix+$ renames the focused workspace - herdr's rename_workspace, moved off its
# default prefix+shift+w onto the tmux rename-session muscle memory ($ = shift+4).
# Uses the literal token (same pattern as prefix+= above); if a reload rejects it,
# fall back to "prefix+shift+4". Run `herdr config check` after apply to confirm.
rename_workspace = "prefix+$"

# prefix+% renames the focused TAB - herdr's rename_tab (the 1.🖋️/2.🤖/3.🔨 top-bar
# items), moved off its default prefix+shift+t. Pairs with rename_workspace on
# prefix+$ above (% = shift+5 sits right next to $ = shift+4). Literal token, same
# pattern as prefix+= / prefix+$; if a reload rejects it, fall back to "prefix+shift+5".
rename_tab = "prefix+%"

# prefix+^ renames the focused PANE - herdr's rename_pane, moved off its default
# prefix+shift+p. Completes the rename ladder on adjacent shifted number keys:
# $ (shift+4) workspace, % (shift+5) tab, ^ (shift+6) pane. Literal token, same
# pattern as above; if a reload rejects it, fall back to "prefix+shift+6".
rename_pane = "prefix+^"

# settings on herdr's default prefix+s. prefix+, is intentionally left FREE so the
# ghostty ctrl+; forward (→ prefix+,) lands on nothing — ctrl+; no longer opens
# settings (an unwanted accidental trigger, since ;-hold IS the ctrl key here).
settings = "prefix+s"

# Unbind prefix+o (herdr's native open_notification_target). An empty string
# disables the action, freeing the key. (Dead in 0.7.3 anyway — no target.)
# Load-bearing: cycle_pane_next now claims prefix+o.
open_notification_target = ""

# Single-chord window/tab nav (ctrl+1..9) is handled by PREFIX-EXPANSION at the
# terminal, NOT here: ghostty/kitty translate ctrl+N into `prefix N`, so it lands
# on herdr's native switch_tab (prefix+1..9, 1-indexed). No herdr keybind needed —
# ctrl+N arrives as the ordinary prefix sequence and works over --remote.

# prefix+= is a second key for horizontal split, alongside herdr's built-in
# split_horizontal = "prefix+minus" (the - and = keys sit together, tmux muscle
# memory). The built-in action takes only ONE key, so the alias is a shell binding
# that calls the CLI: `herdr pane split --current --direction down` splits the
# globally-focused pane downward (down = horizontal divider, same as prefix+minus).
# The = key uses its literal token here ("prefix+="); herdr rejects "prefix+equal"
# as an invalid keybinding (unlike minus/plus/comma, "equal" is not a named token).
[[keys.command]]
key = "prefix+="
type = "shell"
command = "herdr pane split --current --direction down --focus"
description = "horizontal split (alias of prefix+minus)"

# lazygit in a session-modal floating popup (herdr's display-popup), matching the
# tmux ctrl+g lazygit popup instead of the old full-screen zoom pane. Runs
# server-side, where the repo lives — works local AND --remote. 90% for parity with
# the tmux popup (lazygit is a dense full-screen TUI). Direct chord ctrl+g for
# single-motion (;-hold + g).
# NOTE: ctrl+g is thereby taken from pane apps (nvim "show file info", readline
# abort) — switch to "ctrl+alt+g" if that bites. (prefix+shift+g was wrong: it's
# herdr's built-in new_worktree.)
# CWD: relies on new_cwd = "follow" so the popup opens on the focused pane's repo.
# If lazygit opens in $HOME instead, popups don't inherit pane cwd — revert to
# type = "pane" for this binding.
[[keys.command]]
key = "ctrl+g"
type = "popup"
command = "lazygit"
width = "90%"
height = "90%"
description = "lazygit (server-side, on the pane's repo)"

# yazi seeded from the sibling nvim's current buffer (or its cwd) — herdr
# counterpart of the tmux rctrl-y launcher. Direct chord ctrl+y (;-hold + y),
# matching ctrl+g lazygit. skhd's rctrl-y is freed so ctrl+y reaches herdr; tmux
# mirrors it with -n C-y. NOTE: side-blind — takes ctrl+y from nvim (scroll-up) /
# readline (yank), same tradeoff as ctrl+g.
[[keys.command]]
key = "ctrl+y"
type = "popup"
command = "yazi-herdr.sh"
width = "90%"
height = "90%"
description = "yazi (seeded from the sibling nvim buffer / cwd)"

# ctrl+t → herdr-sesh.sh, the sesh-style session picker (herdr-native replacement
# for the tmux sesh popup). type=popup = a session-modal floating overlay (herdr's
# own display-popup) that leaves the tab layout untouched, mirroring the tmux sesh
# display-popup rather than the old full-screen zoom pane. Still runs server-side so
# it works over --remote. Reuses `sesh list -c -z --icons` so config entries come
# live from sesh.toml (⚙) and recent dirs from zoxide (📁), with herdr's OPEN
# workspaces pinned at top (⚡). Select an open workspace → focus; select a dir →
# herdr-sesh-layout.sh opens it (pen nvim + fish shells), attaching to an existing
# workspace if one's already there. Direct chord ;-hold + t. skhd's rctrl-t is freed
# so ctrl+t reaches herdr; tmux mirrors -n C-t → the tmux sesh popup for the
# plain-tmux world (same wiring as ctrl+g lazygit / ctrl+y yazi). zoxide is folded
# into this one picker, so there is no separate prefix+t binding anymore.
# 70% keeps the ⚡name│path│git columns (~90 cols) uncramped while staying clearly
# floating, not fullscreen; tune width/height to taste.
[[keys.command]]
key = "ctrl+t"
type = "popup"
command = "herdr-sesh.sh"
width = "70%"
height = "70%"
description = "sesh-style session picker"

# prefix+n → new glyph-aware workspace rooted at the focused pane's cwd. herdr's
# native new_workspace (default prefix+shift+n) labels with the bare basename and
# skips the 🌳/🌿/📁 glyph, which lives only in herdr-sesh-layout.sh. This routes
# through herdr-new-workspace.sh → that layout script, so a keybind-created workspace
# reads the same as a ctrl+t-picker one (glyph + pen/robot/hammer dev layout).
# Overrides herdr's default next_tab on prefix+n (unused here — tab nav is ctrl+1..9).
# type="shell" runs server-side; REMOTE needs the script present + --remote-keybindings server.
[[keys.command]]
key = "prefix+n"
type = "shell"
command = "herdr-new-workspace.sh"
description = "new glyphed workspace at focused cwd (dev layout)"

# ctrl+, → focus the next agent that needs you, in priority order (blocked/needs-input
# first, then done), cycling on repeat. The wrapper narrows herdr's next_agent (which
# walks ALL agents incl. working/idle) to just the ones demanding attention. Mirrors
# the tmux-dash next-input jump. Bound as prefix+i, NOT a direct ctrl chord: ghostty/kitty
# hijack ctrl+, and re-emit it as `prefix i`, so herdr never sees the raw chord. prefix+a
# was unavailable (next_agent), hence i (= "input needed").
[[keys.command]]
key = "prefix+i"
type = "shell"
command = "herdr-next-priority-agent.sh"
description = "focus next agent needing attention (blocked→done)"

# ctrl+space → best-effort "last tab" toggle within the current workspace. HACK: herdr
# has no last_tab and no focus-history, so hack-herdr-last-tab.sh fakes MRU via a state
# file (bounces to the tab you last pressed ctrl+space from). Mirrors the tmux ctrl+space
# last-window toggle. Bound as prefix+space because ghostty/kitty re-emit ctrl+space as
# `prefix space` - the raw chord never reaches herdr.
[[keys.command]]
key = "prefix+space"
type = "shell"
command = "hack-herdr-last-tab.sh"
description = "last tab toggle (best-effort MRU)"

# ctrl+enter → best-effort "last workspace" toggle. HACK: herdr has no last_workspace
# and no focus-history, so hack-herdr-last-workspace.sh fakes MRU via a state file
# (bounces to the workspace you last pressed ctrl+enter from). Mirrors the tmux
# switch-client -l session jump. Bound as prefix+shift+l because ghostty/kitty re-emit
# ctrl+enter as `prefix L` - the raw chord never reaches herdr.
[[keys.command]]
key = "prefix+shift+l"
type = "shell"
command = "hack-herdr-last-workspace.sh"
description = "last workspace toggle (best-effort MRU)"

# ctrl+b → previous pane in the current tab. Replaces herdr's native last_pane (global,
# leaks across workspaces/tabs) with a tab-scoped toggle: the herdr-focus-tracker daemon
# keeps per-tab pane MRU from the socket's pane.focused stream, and hack-herdr-last-pane.sh
# jumps to it (via `agent focus <pane_id>`, since herdr has no `pane focus <id>`). Direct
# chord — ghostty doesn't intercept ctrl+b, and prefix is ctrl+a so ctrl+b is free.
[[keys.command]]
key = "ctrl+b"
type = "shell"
command = "hack-herdr-last-pane.sh"
description = "last pane in current tab (isolated toggle)"

# prefix+f → git-aware file viewer (smarzban/herdr-file-viewer): read-only tree with git
# status glyphs, right pane auto-picks diff/rendered/syntax. Toggle scoped to current tab,
# so bound type="shell" as the plugin intends. Inside: f find, v cycle view, b toggle
# baseline, e edit, Z fullscreen, ? help.
#
# Requires the plugin installed on whichever host runs the herdr server:
#   herdr plugin install smarzban/herdr-file-viewer
# REMOTE CAVEAT: type="shell" binding, so over `herdr --remote` it needs
# --remote-keybindings server and the plugin present on the remote box.
[[keys.command]]
key = "prefix+f"
type = "shell"
command = "herdr plugin action invoke open-file-viewer --plugin herdr-file-viewer"
description = "git-aware file viewer (status glyphs + diffs)"

# prefix+F (shift+f) → herdr-pluck: tmux-fingers-style "grab a visible token". Overlays
# one/two-letter hints on every URL / file path / git SHA / UUID / IP / k8s ref in the pane
# and copies the picked one to the system clipboard (pbcopy here). type="plugin_action" is the
# NATIVE plugin binding (like the vim-herdr-navigation chords), so it runs server-side and works
# over --remote without --remote-keybindings=server (unlike the type="shell" prefix+f above).
# Install (not chezmoi-managed — run on a fresh box): herdr plugin install rmarganti/herdr-pluck
[[keys.command]]
key = "prefix+shift+f"
type = "plugin_action"
command = "rmarganti.herdr-pluck.pluck"
description = "pluck: copy a visible token (URL/path/SHA) via hints"

[theme]
# Match the tokyonight scheme without needing the macOS colorscheme tooling.
name = "terminal"
auto_switch = false

[remote]
# Write a private temp SSH config (includes ~/.ssh/config) with keepalive +
# per-attach control sockets for connection reuse over `herdr --remote`.
manage_ssh_config = true

[ui]
mouse_capture = true

# Show detected/reported agent labels (claude / codex / etc.) in split-pane
# borders when no manual pane name is set - mirrors the tmux-dash agent chips.
show_agent_labels_on_pane_borders = true

# Order the Agents panel as an attention queue (blocked/needs-input first) instead
# of the default "spaces" (grouped by workspace), so the sidebar visually surfaces
# blocked agents at the top - keeps the panel readable at a glance. Use herdr's
# native next_agent (prefix+a) to walk the queue.
agent_panel_sort = "priority"

# Active/focused split-pane border + nav highlight. This `accent` line and the
# generated [theme.custom] block at the bottom of this file are both retargeted
# to the active colorscheme by generate_herdr_config in colorscheme-set.sh on
# every theme switch - value here is just the current-scheme seed (gnohj_color03,
# same as the tmux active-pane border). accent is NOT a [theme.custom] token, so
# it has to live here under [ui].
accent = "#a7cfbd"

# Background notification popups. "system" hands agent done / needs-attention
# popups to the OS notification service, so they surface at the OS level even when
# herdr isn't the focused app (the point of desktop notifications). The alternative
# "herdr" keeps toasts in-app but they're invisible when herdr is unfocused. The
# [ui.toast.herdr] position below only applies under "herdr" - harmless, kept for a
# quick flip back. Kept last in the [ui] block so this subtable doesn't swallow the
# bare keys above.
[ui.toast]
delivery = "system"

# In-app toast position. Default is bottom-right; top-right keeps popups up out of
# the way of the shell prompt / agent input at the bottom of a pane.
[ui.toast.herdr]
position = "top-right"

# Silence agent state-change sounds in background workspaces. herdr's default is
# `[ui.sound] enabled = true`, which plays a sound on agent done / needs-attention.
# Toasts still render (see [ui.toast] above); this only mutes the audio.
[ui.sound]
enabled = false

# Sidebar space rows: name, then a gitmux status line on its OWN line, then branch.
# herdr's built-in `git_status` token carries NO working-tree signs (its data model
# has branch but no dirty/ahead/behind - verified against `herdr api schema`), so the
# middle line is a CUSTOM `$git` token fed by herdr-git-status.sh, which runs the same
# gitmux.yml as the tmux status line and pushes it via `herdr workspace
# report-metadata --token git=…`. That poller is what keeps this line live.
[ui.sidebar.spaces]
rows = [["state_icon", "workspace"], ["$git"], ["branch"]]

[session]
resume_agents_on_restore = true

# vim-herdr-navigation (https://github.com/paulbkim-dev/vim-herdr-navigation):
# seamless ctrl+h/j/k/l across herdr panes AND Neovim splits. On each press the
# action checks the focused pane's foreground process via `herdr pane
# process-info` (needs jq) — if it's vim/nvim it forwards the key into that pane,
# otherwise it moves herdr's focus. The Neovim half is wired in
# dot_config/nvim/lua/plugins/herdr-navigator.lua. Direct chords (no prefix), so
# the `th` passthrough tmux (prefix None) hands ctrl+h/j/k/l straight to herdr.
#
# Requires the herdr-side plugin to be installed (otherwise these error "plugin
# action not found"):  herdr plugin install paulbkim-dev/vim-herdr-navigation
[[keys.command]]
key = "ctrl+h"
type = "plugin_action"
command = "vim-herdr-navigation.left"
description = "navigate left (vim/herdr)"

[[keys.command]]
key = "ctrl+j"
type = "plugin_action"
command = "vim-herdr-navigation.down"
description = "navigate down (vim/herdr)"

[[keys.command]]
key = "ctrl+k"
type = "plugin_action"
command = "vim-herdr-navigation.up"
description = "navigate up (vim/herdr)"

[[keys.command]]
key = "ctrl+l"
type = "plugin_action"
command = "vim-herdr-navigation.right"
description = "navigate right (vim/herdr)"

[experimental]
# Render the Kitty graphics protocol inside herdr panes so yazi image previews,
# image.nvim, etc. actually draw. herdr sits between yazi and the outer terminal
# and swallows graphics escapes unless this is on. Outer terminal is ghostty,
# which is Kitty-graphics-compatible, so the requirement is met. Flagged
# experimental by herdr (0.7.3) — previews may still be imperfect.
kitty_graphics = true

# Persist each pane's recent screen content across full herdr server restarts, so
# panes come back with their output (not just layout + blank scrollback).
pane_history = true
# >>> colorscheme-set: herdr theme palette - generated, do not edit (see generate_herdr_config) >>>
[theme.custom]
panel_bg = "reset"
# surface_dim drives the sidebar active/selected row bg and surface0 the inactive
# tab bg (verified live against herdr 0.7.3). Both set to gnohj_color26 - the same
# dark tint tmux-dash uses for its active-session row (bg_active_session) - so the
# active item reads as that subtle near-bg fill. surface1 tracks them for a flat ramp.
surface_dim = "#1e2528"
surface0 = "#1e2528"
surface1 = "#1e2528"
overlay0 = "#536571"
overlay1 = "#7a90a0"
# herdr sidebar token map (verified via diagnostic): text = active/focused row's
# whole line (workspace+tab), subtext0 = inactive rows' whole line, mauve = active
# space's branch line. These tokens are SHARED by the spaces AND agents sections,
# so they can't be set per-panel. subtext0 = gnohj blue (agents/inactive rows),
# text = default, mauve = green (only the active space's branch line).
subtext0 = "#a3b8c6"
text = "#b8c9d3"
mauve = "#c2f0db"
# herdr colors the agent "idle" state with its green token and the "working" state
# with its yellow token (both verified live). Point green at gnohj_color05 (idle)
# and yellow at gnohj_color04 (working) so the two states read yellow/blue exactly
# like tmux-dash's @chip_idle / @chip_working. NOTE: herdr has no per-state color
# config, so any other element using green/yellow shifts with them.
green = "#dab183"
yellow = "#a3b8c6"
red = "#da858e"
# blue = the sidebar  status line (herdr renders the custom git metadata token
# in its blue token - verified via diagnostic: recoloring blue changed ONLY the git
# signs, not names/branches/borders). Pointed at gnohj_color02 (green) so the git
# signs read green, matching the tmux-dash git-status glyphs. The workspace NAME uses
# subtext0 and the branch uses overlay0 (shared with borders/headers), so neither of
# those can be recolored independently - blue is the one git-isolated token.
blue = "#b7ce97"
teal = "#a7cfbd"
peach = "#dc988e"
# Copy-mode (visual selection) highlight - herdr's src/selection.rs reads these
# two CustomThemeColors fields. Point them at the exact pair tmux's mode-style
# uses (generate-tmux-colors.sh: "bg=$gnohj_color13,fg=$gnohj_color02") so a
# selection in a herdr pane reads identically to one in tmux copy-mode: slate
# bg (color13) under green text (color02).
selection_background = "#536571"
selection_foreground = "#b7ce97"
# <<< colorscheme-set: herdr theme palette <<<
