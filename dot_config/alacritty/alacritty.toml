# Alacritty - tuned for the ovim popup.

[window]
# "None" = borderless (no decorations/traffic lights)
decorations = "None"
dimensions = { columns = 100, lines = 30 }
padding = { x = 12, y = 12 }
option_as_alt = "Both"
opacity = 0.95

[font]
size = 14.0

[env]
# Fix terminfo not found on Nix systems
TERM = "xterm-256color"

[terminal]
shell = { program = "/bin/zsh", args = ["-l"] }
