# ─── tmux agentic.conf ──────────────────────────────────────────────────────
# The AI-agent / tmux-dash layer, sourced by tmux.conf AFTER base.conf (so its
# C-h override wins over vim-tmux-navigator's default installed by tpm in base).
# native.conf omits this file; herdr.conf never touches it.
#
# Contains: agent-status pane-border chips, the sesh fast-nvim session hook,
# the gh-dash/treehouse worktree sweep, the Claude-prompt jump, and the
# tmux-dash sidebar-aware C-h.

# Turn the top border into a label bar: a pane-identity chip pinned left, the
# agent-activity label pinned right. `#[align=right]` opens the right-justified
# half, so the two ends stay glued to the pane edges at any width.
#
# The whole label is guarded by `#{?#{@agent_status},…,}` so it renders ONLY on
# agent panes (the ones tmux-dash tags). Non-agent panes (plain shells, editors)
# have no @agent_status, so their label is empty - a clean, bare border line.
# (pane-border-status itself is a per-WINDOW option, so the border-status row
# still exists on those panes; only its text is blanked.)
#
# All colors come from `#{@chip_*}` user options set by generate-tmux-colors.sh
# from the active palette, so the pills follow the colorscheme (no hardcoded
# hexes). Formats resolve at draw time, so the vars being set later is fine.
#
# Left carries `index · label · command` as a "pill" (middot separator). The active pane
# gets a filled accent-green pill (@chip_green bg, @chip_dark text); inactive
# panes dim the bg to muted gray (@chip_gray) but keep the text green - present,
# not gone, matching the inactive right pill's colored-text treatment.
#
# Right is a filled pill reading `@agent_status`. Its color MIRRORS the sidebar's
# per-status theme (state::load_theme): working=@chip_working (blue),
# idle=@chip_idle (orange), input=@chip_input (red), new=@chip_new (aqua),
# limit=@chip_input (red). Active panes fill the pill (dark text on the status
# color); inactive panes dim the bg to gray but keep the status word in its status
# color, so a background pane flipping to input is still spottable. The trailing
# dot (active ●, inactive ○) is tinted the same per-status color as the pill, so
# it reads as a status glyph too. (Non-agent panes never reach here - the outer
# @agent_status guard blanks the whole label.)
#
# Escaping note: a comma inside `#[fg=…,bg=…]` that sits *inside* a `#{?…}`
# conditional must be written `#,` or tmux mis-splits the conditional branches.
set -g pane-border-status top
set -g pane-border-format "#{?#{@agent_status},#[align=left] #{?pane_active,#[fg=#{@chip_dark}#,bg=#{@chip_green}],#[fg=#{@chip_green}#,bg=#{@chip_gray}]} #{e|+:#{pane_index},1} · #{?#{@agent_label},#{@agent_label} · ,}#{?#{@agent_harness},#{@agent_harness},#{pane_current_command}} #[default]#[align=right]#{?pane_active,#{?#{==:#{@agent_status},working},#[fg=#{@chip_dark}#,bg=#{@chip_working}],#{?#{==:#{@agent_status},input},#[fg=#{@chip_dark}#,bg=#{@chip_input}],#{?#{==:#{@agent_status},idle},#[fg=#{@chip_dark}#,bg=#{@chip_idle}],#{?#{==:#{@agent_status},new},#[fg=#{@chip_dark}#,bg=#{@chip_new}],#{?#{==:#{@agent_status},limit},#[fg=#{@chip_dark}#,bg=#{@chip_done}],#[fg=#{@chip_dark}#,bg=#{@chip_done}]}}}}} #{@agent_status} #[default],#{?#{==:#{@agent_status},working},#[fg=#{@chip_working}#,bg=#{@chip_gray}],#{?#{==:#{@agent_status},input},#[fg=#{@chip_input}#,bg=#{@chip_gray}],#{?#{==:#{@agent_status},idle},#[fg=#{@chip_idle}#,bg=#{@chip_gray}],#{?#{==:#{@agent_status},new},#[fg=#{@chip_new}#,bg=#{@chip_gray}],#{?#{==:#{@agent_status},limit},#[fg=#{@chip_done}#,bg=#{@chip_gray}],#[fg=#{@chip_done}#,bg=#{@chip_gray}]}}}}} #{@agent_status} #[default]}  #{?#{==:#{@agent_status},working},#[fg=#{@chip_working}],#{?#{==:#{@agent_status},input},#[fg=#{@chip_input}],#{?#{==:#{@agent_status},idle},#[fg=#{@chip_idle}],#{?#{==:#{@agent_status},new},#[fg=#{@chip_new}],#{?#{==:#{@agent_status},limit},#[fg=#{@chip_done}],#[fg=#{@chip_done}]}}}}}#{?pane_active,●,○} ,}"

# Fast nvim for git-repo SESH sessions. The handler is gated on a fresh
# @sesh_spawn stamp (set by every sesh entry point right before `sesh connect`),
# so a manual `tmux new-session` never triggers it. Overrides base.conf's
# rename-only session-created hook (one -g hook, not -ga, so re-sourcing stays
# idempotent) to append the fast-nvim launcher.
set-hook -g session-created 'run-shell "sleep 0.1 && bash ~/.config/tmux/initial-window-setup.sh" ; run-shell -b "~/.config/tmux/sesh-session-created.sh #{hook_session_name}"'

# Auto-release treehouse PR-review worktree slots so you never have to remember
# the gh-dash `R` key: on any window close, sweep returns every leased review
# slot whose PR has no remaining windows. The sweep only touches state-file
# tracked review slots, so ordinary windows/sessions are unaffected. Backgrounded
# (-b) so it never blocks tmux; the script self-debounces the unlink.
set-hook -g window-unlinked 'run-shell -b "~/.config/gh-dash/review-worktree.sh sweep || true"'

# Jump to the last user prompt in a Claude Code chat. Searches backward
# for "❯ " (Claude's rendered user-message bullet — same chevron char as
# starship's shell prompt, but in a Claude pane the chat content is the
# only source). Lands in copy-mode at the match; hit `q`/`esc` to exit,
# or `?❯ ` then `n` to step back through earlier prompts.
# Lowercase `u` because tpm hardcodes uppercase `U` for plugin updates.
bind u copy-mode \; \
  send -X cursor-up \; \
  send -X search-backward "❯ " \; \
  display-message "💬 Jumped to last user prompt (q to exit)"

# Ctrl-h at the leftmost, non-nvim tmux pane focuses the tmux-dash sidebar
# (the host is the outermost vim-tmux-navigator layer). In nvim, or when a pane
# exists to the left, defer to vim-tmux-navigator's normal behavior. Only C-h is
# overridden - C-j/C-k/C-l/C-\ keep the plugin's defaults. Must come after tpm
# (base.conf) so this binding wins over the plugin's default C-h.
bind-key -n C-h if-shell -F "#{m/ri:^(view|l?n?vim?x?|fzf)(diff)?$,#{pane_current_command}}" \
  { send-keys C-h } \
  { if-shell -F '#{pane_at_left}' \
      { run-shell "pkill -USR1 -x tmux-dash" } \
      { select-pane -L } }
