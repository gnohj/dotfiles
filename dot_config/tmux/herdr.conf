# ─── tmux herdr.conf ────────────────────────────────────────────────────────
# INVISIBLE HOST for the herdr client. herdr draws its own status bar, pane
# borders, and panes, so this tmux draws NOTHING — no status line, no borders,
# no colors, no keybindings of its own. Its only jobs:
#   1. host the herdr client full-window (local `herdr` or `herdr --remote host`)
#   2. be the -L herdr socket that skhd's sesh/launcher display-popups draw over
#   3. get out of herdr's key way (no prefix, no root bindings) so every key —
#      including ctrl+a (herdr's own prefix) and C-h/j/k/l (herdr's navigator) —
#      passes straight through.
#
# Standalone: does NOT source base.conf (base's prefix/status/mouse/plugins are
# exactly what we want gone). Launch:  th  (alias → tmux -L herdr -f this file).

# No prefix, no leader: hand ctrl+a (and everything else) to herdr.
set -g prefix None
unbind C-a
unbind C-b

# Zero tmux UI — herdr renders it all.
set -g status off
set -g pane-border-status off
set -g pane-border-lines simple
set -g mouse off

# Pass the modern terminal through intact so herdr's own kitty-protocol input,
# truecolor, image passthrough, and OSC52 clipboard work end-to-end.
set -sg terminal-overrides ",*:RGB"
set -g default-terminal "${TERM}"
set -gq allow-passthrough on
set -g set-clipboard on
set-window-option -g xterm-keys on
set -g extended-keys always
set -g extended-keys-format csi-u

# Snappy passthrough.
set -sg escape-time 0
set-option -g history-limit 10000
set -g focus-events on

# Login shell so PATH/env match everywhere; run `herdr` or `herdr --remote host`.
set -g default-shell $SHELL
set -g default-command "${SHELL} -l"
