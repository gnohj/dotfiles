#    ‚ēö‚ēź‚ēĚ   ‚ēö‚ēź‚ēĚ     ‚ēö‚ēź‚ēĚ ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ ‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēĚ
#
# Terminal multiplexer
# https://github.com/tmux/tmux

source "$HOME/.config/colorscheme/active/active-colorscheme.sh"

# Set PATH for tmux to include Homebrew and Nix
set-environment -g PATH "/opt/homebrew/bin:/opt/homebrew/sbin:/run/current-system/sw/bin:$PATH"

set -sg terminal-overrides ",*:RGB"

set -g default-terminal "${TERM}"

# default sets bg to transparent
set -g status-style 'bg=default'

# Update status bar every 1 second to reflect changes in system info and window names
set -g status-interval 1

set -g pane-border-lines single

# Active-pane indicator drawn on the border. [off | colour | arrows | both]
#
# The AI-widget windows (ūü§Ė) signal the active pane with their green header chip,
# so arrow markers there are redundant ‚Üí off. Every other ("dim") window has no
# agent chip, so it gets the direction arrows back to show which pane is active.
# `pane-border-indicators` is a choice option (no #{} formats), so this is done
# per-window via a focus hook rather than a conditional value. `off` stays the
# global default (covers ūü§Ė windows + any window before it's first focused).
set -g pane-border-indicators off
set-hook -g pane-focus-in 'if-shell -F "#{m:*ūü§Ė*,#{window_name}}" "setw pane-border-indicators off" "setw pane-border-indicators arrows"'

# Turn the top border into a label bar: a pane-identity chip pinned left, the
# agent-activity label pinned right. `#[align=right]` opens the right-justified
# half, so the two ends stay glued to the pane edges at any width.
#
# The whole label is guarded by `#{?#{@agent_status},‚Ä¶,}` so it renders ONLY on
# agent panes (the ones tmux-dash tags). Non-agent panes (plain shells, editors)
# have no @agent_status, so their label is empty - a clean, bare border line.
# (pane-border-status itself is a per-WINDOW option, so the border-status row
# still exists on those panes; only its text is blanked.)
#
# All colors come from `#{@chip_*}` user options set by generate-tmux-colors.sh
# from the active palette, so the pills follow the colorscheme (no hardcoded
# hexes). Formats resolve at draw time, so the vars being set later is fine.
#
# Left carries `index ¬∑ label ¬∑ command` as a "pill" (middot separator). The active pane
# gets a filled accent-green pill (@chip_green bg, @chip_dark text); inactive
# panes dim the bg to muted gray (@chip_gray) but keep the text green - present,
# not gone, matching the inactive right pill's colored-text treatment.
#
# Right is a filled pill reading `@agent_status`. Its color MIRRORS the sidebar's
# per-status theme (state::load_theme): working=@chip_working (blue),
# idle=@chip_idle (orange), input=@chip_input (red), new=@chip_new (aqua),
# limit=@chip_input (red). Active panes fill the pill (dark text on the status
# color); inactive panes dim the bg to gray but keep the status word in its status
# color, so a background pane flipping to input is still spottable. The trailing
# dot (active ‚óŹ, inactive ‚óč) is tinted the same per-status color as the pill, so
# it reads as a status glyph too. (Non-agent panes never reach here - the outer
# @agent_status guard blanks the whole label.)
#
# Escaping note: a comma inside `#[fg=‚Ä¶,bg=‚Ä¶]` that sits *inside* a `#{?‚Ä¶}`
# conditional must be written `#,` or tmux mis-splits the conditional branches.
set -g pane-border-status top
set -g pane-border-format "#{?#{@agent_status},#[align=left] #{?pane_active,#[fg=#{@chip_dark}#,bg=#{@chip_green}],#[fg=#{@chip_green}#,bg=#{@chip_gray}]} #{e|+:#{pane_index},1} ¬∑ #{?#{@agent_label},#{@agent_label} ¬∑ ,}#{?#{@agent_harness},#{@agent_harness},#{pane_current_command}} #[default]#[align=right]#{?pane_active,#{?#{==:#{@agent_status},working},#[fg=#{@chip_dark}#,bg=#{@chip_working}],#{?#{==:#{@agent_status},input},#[fg=#{@chip_dark}#,bg=#{@chip_input}],#{?#{==:#{@agent_status},idle},#[fg=#{@chip_dark}#,bg=#{@chip_idle}],#{?#{==:#{@agent_status},new},#[fg=#{@chip_dark}#,bg=#{@chip_new}],#{?#{==:#{@agent_status},limit},#[fg=#{@chip_dark}#,bg=#{@chip_input}],#[fg=#{@chip_dark}#,bg=#{@chip_green}]}}}}} #{@agent_status} #[default],#{?#{==:#{@agent_status},working},#[fg=#{@chip_working}#,bg=#{@chip_gray}],#{?#{==:#{@agent_status},input},#[fg=#{@chip_input}#,bg=#{@chip_gray}],#{?#{==:#{@agent_status},idle},#[fg=#{@chip_idle}#,bg=#{@chip_gray}],#{?#{==:#{@agent_status},new},#[fg=#{@chip_new}#,bg=#{@chip_gray}],#{?#{==:#{@agent_status},limit},#[fg=#{@chip_input}#,bg=#{@chip_gray}],#[fg=#{@chip_green}#,bg=#{@chip_gray}]}}}}} #{@agent_status} #[default]}  #{?#{==:#{@agent_status},working},#[fg=#{@chip_working}],#{?#{==:#{@agent_status},input},#[fg=#{@chip_input}],#{?#{==:#{@agent_status},idle},#[fg=#{@chip_idle}],#{?#{==:#{@agent_status},new},#[fg=#{@chip_new}],#{?#{==:#{@agent_status},limit},#[fg=#{@chip_input}],#[fg=#{@chip_green}]}}}}}#{?pane_active,‚óŹ,‚óč} ,}"

set-option -g history-limit 10000

set -g set-clipboard on
set -g set-titles off
set -gq allow-passthrough on # Enables passthrough mode in Tmux 3.3+ for rendering images via nvim - image.nvim
set -g visual-activity off # Automatically show/hide images when switching tabs (windows) per session

set-window-option -g xterm-keys on
set -g extended-keys on
set -g extended-keys-format csi-u

set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

unbind %
# bind | split-window -h 
unbind '"'
# bind - split-window -v
# Open panes in cwd
bind '-' split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"

# Create new windows with fish emoji for shell
bind c new-window -n "ūüź†" -c "#{pane_current_path}"

# Set initial window name on session creation based on context.
# Second chained command: fast nvim for git-repo SESH sessions. The handler is
# gated on a fresh @sesh_spawn stamp (set by every sesh entry point right before
# `sesh connect`), so a manual `tmux new-session` never triggers it. Chained in
# one -g hook (not -ga) so re-sourcing the config stays idempotent.
set-hook -g session-created 'run-shell "sleep 0.1 && bash ~/.config/tmux/initial-window-setup.sh" ; run-shell -b "~/.config/tmux/sesh-session-created.sh #{hook_session_name}"'
set-hook -g client-attached 'run-shell "bash ~/.config/tmux/initial-window-setup.sh"'

unbind r
bind r source-file ~/.config/tmux/tmux.conf \; source-file ~/.config/tmux/tmux-colors.conf \; display-message "Config reloaded"

bind j resize-pane -D 25
bind k resize-pane -U 25
bind l resize-pane -R 25
bind h resize-pane -L 25

bind -r m resize-pane -Z

set -g mouse on

# Status-line left-click: the session name carries a `range=user|sesh` marker
# (set in generate-status-line.sh), so a click there opens the sesh picker. The
# popup is opened DIRECTLY (not via the skhd wrapper) so tmux runs it on the
# CLICKING client's own server ‚ÄĒ sesh connect inside then switches that exact
# client, with no `focused-socket` guessing (which targeted -L default and so
# never moved you when clicking from another server). Any other status range
# keeps the default of selecting the clicked window (`switch-client -t =`
# resolves the `range=window|<idx>` target).
bind-key -T root MouseDown1Status if-shell -F "#{==:#{mouse_status_range},sesh}" \
  { display-popup -E -w 28% -h 40% -b none "$HOME/.config/tmux/sesh-popup.sh" } \
  { switch-client -t = }

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-selection # copy text with "y"
bind-key -T copy-mode-vi 'q' send -X copy-selection # copy text with "y"

# Left mouse drag: select but stay in copy-mode (copy manually with y/q) ‚ÄĒ unchanged.
unbind -T copy-mode-vi MouseDragEnd1Pane

# Right mouse drag: select + auto-copy to the macOS clipboard on release.
# Free the right button from its default context menu so it can drag
# (Alt+right-click still opens that menu). Mirror the default left-drag
# guard so right-drag still passes through to mouse-aware apps (nvim, TUIs).
unbind -T root MouseDown3Pane
bind-key -T root MouseDrag3Pane if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -M }
bind-key -T copy-mode-vi MouseDrag3Pane send -X begin-selection
bind-key -T copy-mode-vi MouseDragEnd3Pane send -X copy-pipe-and-cancel "pbcopy"

# Yank last shell command + its output. Searches backward for the
# previous starship prompt char "‚ĚĮ " (the current/new prompt is on the
# same line as the cursor, so we move up one line first to skip it),
# then selects from there to the line above the next prompt ‚ÄĒ capturing
# the full "prev prompt + command + output" range without the trailing
# empty prompt.
bind y copy-mode \; \
  send -X cursor-up \; \
  send -X search-backward "‚ĚĮ " \; \
  send -X begin-selection \; \
  send -X search-forward "‚ĚĮ " \; \
  send -X cursor-up \; \
  send -X end-of-line \; \
  send -X copy-pipe-and-cancel "pbcopy" \; \
  display-message "ūüďč Copied last command + output"

# Jump to the last user prompt in a Claude Code chat. Searches backward
# for "‚ĚĮ " (Claude's rendered user-message bullet ‚ÄĒ same chevron char as
# starship's shell prompt, but in a Claude pane the chat content is the
# only source). Lands in copy-mode at the match; hit `q`/`esc` to exit,
# or `?‚ĚĮ ` then `n` to step back through earlier prompts.
# Lowercase `u` because tpm hardcodes uppercase `U` for plugin updates.
bind u copy-mode \; \
  send -X cursor-up \; \
  send -X search-backward "‚ĚĮ " \; \
  display-message "ūüí¨ Jumped to last user prompt (q to exit)"

# Smart clear: Alt-k clears screen+scrollback in shell, sends Ctrl-l if a program is running
bind -n M-k if-shell "ps -o comm= -t '#{pane_tty}' | grep -vqE '^(zsh|bash|fish)$'" "send-keys C-l" "send-keys -R; clear-history"

bind-key x kill-pane # skip "kill-pane 1? (y/n)" prompt
set -g detach-on-destroy off  # don't exit from tmux when closing a session

# other bindings
colorscheme_selector="~/.config/colorscheme/colorscheme-selector.sh"
unbind 9
bind-key -r 9 run-shell "tmux neww -n 'ūüé® Theme' $colorscheme_selector"

run-shell 'tmux set -g popup-border-style "fg=$gnohj_color24"'

bind-key T run-shell "~/.config/tmux/toggle-terminal-transparency.sh"

# remove delay for exiting insert mode with ESC in Neovim
set -sg escape-time 10

# move tmux bar to top instead of bottom
set -g status-position top

# renumber windows if you close one
set -g renumber-windows on

setenv -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.config/tmux/plugins/"
set -g @tpm_plugins '             \
  tmux-plugins/tpm                \
  christoomey/vim-tmux-navigator  \
  Morantron/tmux-fingers#master   \
'

# Disable tmux-fingers wizard/welcome message
set -g @fingers-skip-wizard 1

# Match file names (anything after the last space)
set -g @fingers-pattern-0 '[a-zA-Z0-9][a-zA-Z0-9._-]*\.(sh|conf|md|json|yml|yaml|js|ts|py)$'

# Match numbers (file sizes, etc)  
set -g @fingers-pattern-1 '[0-9]+\.[0-9]+[a-zA-Z]+'

# Match anything that looks like a filename
set -g @fingers-pattern-3 '[a-zA-Z0-9_-]+\.[a-zA-Z]{2,4}'


# Zero-out escape time delay for quicker response
set -s escape-time 3

bind s choose-tree -Zs -O time -F "#{session_windows}"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'

# Generate and source tmux colors from active colorscheme
run-shell '~/.config/tmux/generate-tmux-colors.sh'
source-file ~/.config/tmux/tmux-colors.conf

# Use emoji based on the running command - configured from external file
source-file ~/.config/tmux/window-emojis.conf
set -g window-status-separator ' '


set-option -g focus-events on
#
# # When a pane gains focus, command it to have a transparent background
# set-hook -g pane-focus-in 'select-pane -P "bg=default"'
#
# # When a pane loses focus, command it to have a solid black background
# set-hook -g pane-focus-out 'select-pane -P "bg=$gnohj_color10"'

# Add empty line after status bar for spacing (must be after TPM)
set -g status 2
set -g status-format[1] ''


# Use the user's default shell (from $SHELL environment variable)
# This allows tmux to respect whatever shell you're using (zsh, fish, etc.)
# Use login shell to ensure PATH is properly initialized (sources .zshrc)
set -g default-shell $SHELL
set -g default-command "${SHELL} -l"
