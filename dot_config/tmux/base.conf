# ─── tmux base.conf ───────────────────────────────────────────────────────────
# Shared core, sourced by the profile entrypoints:
#   tmux.conf   = base.conf + agentic.conf   (default socket, unchanged daily driver)
#   native.conf = base.conf                  (clean personal tmux, no agent HUD)
# herdr.conf is standalone (does NOT source this) - see that file.
#
# The AI-agent / tmux-dash layer (agent-status pane chips, sesh fast-nvim hook,
# gh-dash worktree sweep, tmux-dash sidebar C-h, Claude-prompt jump) lives in
# agentic.conf so native.conf can omit it by simply not sourcing it.

source "$HOME/.config/colorscheme/active/active-colorscheme.sh"

# Set PATH for tmux (Homebrew + Nix); macOS dirs first, ~/.local/bin appended. linuxbrew re-added ONLY on Linux (below) - on macOS /home is autofs, so a /home/linuxbrew PATH entry makes every gitmux/status cut/git lookup a ~10ms autofs stat that pegs opendirectoryd.
set-environment -g PATH "/opt/homebrew/bin:/opt/homebrew/sbin:/run/current-system/sw/bin:$HOME/.local/bin:$PATH"
if-shell '[ "$(uname)" = "Linux" ]' 'set-environment -g PATH "/home/linuxbrew/.linuxbrew/bin:/opt/homebrew/bin:/opt/homebrew/sbin:/run/current-system/sw/bin:$HOME/.local/bin:$PATH"'

set -sg terminal-overrides ",*:RGB"

set -g default-terminal "${TERM}"

# default sets bg to transparent
set -g status-style 'bg=default'

# Update status bar every 1 second to reflect changes in system info and window names
set -g status-interval 1

# Resolve the machine's city (public-IP geoip, cached ~1h) into @host_city for the
# host cell (host@city). Backgrounded so startup never blocks; on a network failure
# host-city prints nothing, leaving @host_city empty → the cell shows just the hostname.
run-shell -b 'tmux set -g @host_city "$(~/.local/bin/host-city 2>/dev/null)"'

# @whoami for the host cell (host_cell_fmt shows it only when not the canonical user); foreground so it lands before the first status draw.
run-shell 'tmux set -g @whoami "$(whoami 2>/dev/null)"'

set -g pane-border-lines heavy

# Active-pane indicator drawn on the border. [off | colour | arrows | both]
#
# Off everywhere: the active pane is now signaled by its border COLOR (sidebar
# green normal / salmon-red in prefix/resize/copy/zoom; inactive panes dim gray —
# see generate-tmux-colors.sh), so the directional arrows are redundant. The `-gu`
# clears any per-window `arrows` override left by the old focus hook so a live
# `source-file` reload takes effect without a restart.
set -g pane-border-indicators off
set-hook -gu pane-focus-in

set-option -g history-limit 10000

set -g set-clipboard on
# Declare the OSC52 clipboard capability for all terminals so `set-clipboard on`
# actually emits OSC52 on copy. Without it, yanks over SSH on a headless VPS
# reach nothing (pbcopy absent, wl-copy has no Wayland display); with it, the
# copy travels OSC52 → the SSH client terminal → the local system clipboard.
set -as terminal-features ',*:clipboard'
set -g set-titles off
set -gq allow-passthrough on # Enables passthrough mode in Tmux 3.3+ for rendering images via nvim - image.nvim
set -g visual-activity off # Automatically show/hide images when switching tabs (windows) per session

set-window-option -g xterm-keys on
set -g extended-keys on
# extended-keys-format is tmux 3.5+; Ubuntu's apt tmux (3.4) errors on it. Guard by version.
%if "#{>=:#{version},3.5}"
set -g extended-keys-format csi-u
%endif
# Ghostty speaks the CSI-u / kitty keyboard protocol, but tmux sees the client as
# `xterm-256color` (default-terminal is ${TERM}, which is flattened for SSH
# portability), and the stock xterm* terminal-features has no `extkeys`. Without
# it, `extended-keys on` is inert: tmux never asks Ghostty for the enhanced
# encoding, so ctrl+<digit>/ctrl+Tab arrive as legacy/NUL bytes and can't be
# bound. Declaring the feature turns the negotiation on. Requires re-attach
# (terminal-features is read at client attach), and only works when the terminal
# in front of tmux actually supports it (Ghostty local; over SSH the far end
# must too). Does NOT add left/right-ctrl handedness — no wire protocol carries that.
set -as terminal-features 'xterm*:extkeys'

set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

unbind %
# bind | split-window -h
unbind '"'
# bind - split-window -v
# Open panes in cwd. smart-split-layout.sh re-balances after the split. First
# horizontal split (v/|) makes a big 75% left pane + 25% right ONLY when the left
# pane runs nvim; a plain shell splits evenly. After that it only rebalances a
# pure single axis - h -> equal columns | | | (never stacks), v (-/=) -> equal
# rows; once nested/mixed the split stays local to that pane (no new bind).
bind '-' split-window -v -c "#{pane_current_path}" \; run-shell 'bash ~/.config/tmux/lib/smart-split-layout.sh v #{window_id}'
bind | split-window -h -c "#{pane_current_path}" \; run-shell 'bash ~/.config/tmux/lib/smart-split-layout.sh h #{window_id}'
# `=` mirrors `-` (vertical split) — reclaimed from the native choose-buffer pick.
bind '=' split-window -v -c "#{pane_current_path}" \; run-shell 'bash ~/.config/tmux/lib/smart-split-layout.sh v #{window_id}'
# `v` mirrors `|` (horizontal split, side by side).
bind v split-window -h -c "#{pane_current_path}" \; run-shell 'bash ~/.config/tmux/lib/smart-split-layout.sh h #{window_id}'

# Create new windows with shell emoji
bind c new-window -n "🐚" -c "#{pane_current_path}"

# Set initial window name on session creation based on context. agentic.conf
# overrides session-created to also launch fast nvim for git-repo SESH sessions.
set-hook -g session-created 'run-shell "sleep 0.1 && bash ~/.config/tmux/initial-window-setup.sh"'
set-hook -g client-attached 'run-shell "bash ~/.config/tmux/initial-window-setup.sh"'

# One-shot resize (prefix + key, re-press prefix each nudge).
bind j resize-pane -D 25
bind k resize-pane -U 25
bind l resize-pane -R 25
bind h resize-pane -L 25

# Sticky resize mode: `prefix r` enters a custom key table where h/j/k/l keep
# resizing without re-pressing the prefix (each key re-enters the table). Caps
# H/J/K/L take bigger 25-cell jumps. Reload lives on `prefix R` (see
# tmux.conf / native.conf).
#
# A custom key table exposes NO format flag (unlike copy's #{pane_in_mode} or
# zoom's #{window_zoomed_flag}), so entering sets a `@resize_mode` session option
# that the border color (generate-tmux-colors.sh) and the border chip
# (pane-border-format in agentic.conf) read to tint salmon-red + show a ⤢ pill.
# The special `Any` key catches every non-resize key (Esc / q / Enter / mistype /
# click), clearing the flag on the way out so the red border can never stick.
#
# `refresh-client` on enter AND on the `Any` exit is load-bearing: a `@resize_mode`
# change alone does NOT repaint pane borders (tmux only redraws borders on a full
# window redraw — copy-mode entry, zoom — not on a session-option flip), so without
# the forced redraw the ⤢ pill / red tint wouldn't appear until the first
# resize-pane keypress and wouldn't clear until the next unrelated redraw.
bind r set @resize_mode 1 \; switch-client -T resize \; refresh-client \; display-message "resize mode: h/j/k/l · Esc to exit"
bind-key -T resize h resize-pane -L 5 \; switch-client -T resize
bind-key -T resize j resize-pane -D 5 \; switch-client -T resize
bind-key -T resize k resize-pane -U 5 \; switch-client -T resize
bind-key -T resize l resize-pane -R 5 \; switch-client -T resize
bind-key -T resize H resize-pane -L 25 \; switch-client -T resize
bind-key -T resize J resize-pane -D 25 \; switch-client -T resize
bind-key -T resize K resize-pane -U 25 \; switch-client -T resize
bind-key -T resize L resize-pane -R 25 \; switch-client -T resize
bind-key -T resize Any set -u @resize_mode \; refresh-client \; display-message "resize mode off"

bind -r m resize-pane -Z

# 1-indexed windows + panes so the FIRST window is :1, matching herdr's 1-indexed
# tabs. This is what makes single-chord ctrl+N land on the same place in both muxes
# (ctrl+N → prefix N → window/tab N, N=1 is first). The old skhd binds faked this
# by mapping key 1 → window :0; base-index 1 makes it real instead of a hidden
# offset. See the window-nav block below and sesh-session-created.sh (targets :1).
set -g base-index 1
setw -g pane-base-index 1
# Keep window numbers gapless so ctrl+1..9 always maps to a real window (closing a
# middle window compacts the rest instead of leaving a hole). Existing sessions
# were renumbered live once with `tmux move-window -r`.
set -g renumber-windows on

set -g mouse on

# Status-line left-click: the session name carries a `range=user|sesh` marker
# (set in generate-status-line.sh), so a click there opens the sesh picker. The
# popup is opened DIRECTLY (not via the skhd wrapper) so tmux runs it on the
# CLICKING client's own server — sesh connect inside then switches that exact
# client, with no `focused-socket` guessing (which targeted -L default and so
# never moved you when clicking from another server). Any other status range
# keeps the default of selecting the clicked window (`switch-client -t =`
# resolves the `range=window|<idx>` target).
bind-key -T root MouseDown1Status if-shell -F "#{==:#{mouse_status_range},sesh}" \
  { display-popup -E -w 28% -h 40% -b none "$HOME/.config/tmux/sesh-popup.sh" } \
  { switch-client -t = }

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-selection # copy text with "y"
bind-key -T copy-mode-vi 'q' send -X copy-selection # copy text with "y"
bind-key -T copy-mode-vi Escape send -X cancel # exit copy-mode with Esc (Ctrl+C still works too)

# Left mouse drag: select but stay in copy-mode (copy manually with y/q) — unchanged.
unbind -T copy-mode-vi MouseDragEnd1Pane

# Right mouse drag: select + auto-copy to the system clipboard on release.
# copy-selection-and-cancel routes through set-clipboard -> OSC52: local clipboard on macOS, your Mac's over SSH (no pbcopy dep).
# Free the right button from its default context menu so it can drag
# (Alt+right-click still opens that menu). Mirror the default left-drag
# guard so right-drag still passes through to mouse-aware apps (nvim, TUIs).
unbind -T root MouseDown3Pane
bind-key -T root MouseDrag3Pane if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -M }
bind-key -T copy-mode-vi MouseDrag3Pane send -X begin-selection
bind-key -T copy-mode-vi MouseDragEnd3Pane send -X copy-selection-and-cancel

# Yank last shell command + its output. Searches backward for the
# previous starship prompt char "^❯ " (anchored to column 0 where the
# prompt lives, so stray mid-line "❯ " in output never matches; the
# current/new prompt is on the same line as the cursor, so we move up
# one line first to skip it), then selects from there to the line above
# the next prompt — capturing the full "prev prompt + command + output"
# range without the trailing empty prompt.
bind y copy-mode \; \
  send -X cursor-up \; \
  send -X search-backward "^❯ " \; \
  send -X begin-selection \; \
  send -X search-forward "^❯ " \; \
  send -X cursor-up \; \
  send -X end-of-line \; \
  send -X copy-selection-and-cancel \; \
  display-message "📋 Copied last command + output"

# prefix+e → scrollback in a transparent chromeless baleia-nvim popup (colors, cursor at bottom, y yanks via tmux, Esc/q close); capture-pane -e keeps ansi, no send-keys so it works over any running app.
bind e capture-pane -e -S - \; save-buffer "/tmp/tmux-scrollback.txt" \; delete-buffer \; display-popup -E -w 90% -h 90% -T " scrollback " "bash ~/.config/tmux/lib/scrollback-view.sh"

# Alt-k: clear scrollback+screen in a shell, else pass Ctrl-l to the running TUI. Native -F match on pane_current_command (no ps|grep fork).
bind -n M-k if-shell -F "#{m/ri:^(zsh|bash|fish)$,#{pane_current_command}}" "send-keys -R; clear-history" "send-keys C-l"

# ctrl+g → lazygit popup. run-shell FORMAT-EXPANDS #{pane_id}/#{pane_current_path} fork-free (display-popup -B does NOT expand) so the script gets them without a display-message fork; detection runs in the popup pty (see lazygit.sh). Root bind takes ctrl+g from pane apps too (nvim/readline).
bind -n C-g run-shell -b "LAZYGIT_HOST_PANE='#{pane_id}' PANE_PATH='#{pane_current_path}' ~/.local/bin/lazygit.sh"

# ;-hold + y (ctrl+y) → yazi — mirrors herdr's ctrl+y yazi pane. Same side-blind
# caveat as C-g (takes ctrl+y from nvim scroll-up / readline yank). -b so the
# script's `tmux new-window` runs detached.
bind -n C-y run-shell -b "~/.local/bin/yazi-launch.sh"

# ctrl+b → smart jump to the rightmost pane, then ping-pong back. If NOT already at the right edge (#{pane_at_right}==0): select-pane -t "{right}" (the rightmost pane), which records the pane I came from as last-pane. If already at the right edge: select-pane -l toggles back to that origin — so repeated C-b bounces origin↔rightmost. 1 pane: pane_at_right==1 → select-pane -l finds no last pane and shows tmux's native "no last pane" (harmless builtin, no copy-mode pager). 2 side-by-side or stacked panes degrade to a plain MRU toggle (both cases land on select-pane -l). Optimal for ≤4 panes where every pane is one C-h/C-l hop from the far right. Native format + select-pane, no fork; root bind, server-side (remote-safe); nvim's C-b freed in blink-cmp.lua. Replaces skhd rctrl-b.
bind -n C-b if-shell -F '#{pane_at_right}' 'select-pane -l' 'select-pane -t "{right}"'

# ctrl+e → focus tmux-dash sidebar on THIS server. Root bind; nvim C-e freed (seeker removed). Replaces skhd rctrl-e.
# `-b` (background) is essential: a foreground run-shell blocks on tmux's command queue for ~0.6-0.9s per press
# (the focus felt "delayed by seconds"); backgrounded it dispatches the signal instantly. `-b` also discards
# output/exit code, so pkill's exit-1-when-not-running can't dump a copy-mode pager — no `|| true` needed.
bind -n C-e run-shell -b "pkill -USR1 -x tmux-dash"

# ctrl+space → last-window toggle (ghostty sends C-a Space). session_windows==1 → "no last window" (nothing to toggle). Otherwise try native last-window; on a fresh session the last-window stack is empty (dev-window.sh builds the robot/hammer windows via `new-window -d`, so focus never leaves pen → nothing pushed), so `last-window` fails — fall back to `next-window` to reach the other windows. After the first toggle the stack is primed and last-window works normally. `|| tmux next-window` keeps run-shell exit 0 (no copy-mode pager dump). Replaces skhd rctrl-space.
bind Space if-shell -F '#{==:#{session_windows},1}' 'display-message "no last window"' 'run-shell "tmux last-window 2>/dev/null || tmux next-window"'

# ctrl+. → tmux-dash agent popup; ctrl+, → table view (summary). ghostty/kitty hijack → C-a g / C-a a → these prefix binds, run server-side. Replaces skhd rctrl-0x2C / rctrl-0x29.
bind g run-shell -b "~/.local/bin/tmux-dash popup"
bind a run-shell -b "~/.local/bin/tmux-dash popup table"

# ctrl+; → jump to next agent needing input (no dashboard UI). ghostty/kitty hijack ctrl+; → C-a , → this prefix bind (the chord and prefix-key intentionally differ post-swap), run server-side (works local + VPS). Replaces skhd rctrl-i (was Mac-only via mux-passthrough lsappinfo gate).
bind , run-shell -b "TD_CLIENT='#{client_name}' ~/.local/bin/tmux-dash-next-input.sh"

# ctrl+' → smart-switch to the latest background-notification's session (notify-switch). ghostty/kitty hijack → C-a ' → this prefix bind, run server-side (works local + VPS). Replaces skhd rctrl-'.
bind "'" run-shell -b "~/.local/bin/notify-idle-switch.sh"

# ctrl+/ → dismiss ALL OS notifications + clear the idle marker (however many are stacked). ghostty/kitty hijack → C-a / → this prefix bind, run server-side (works local + VPS). notify-idle-clear.sh is uname-branched (Darwin: terminal-notifier -remove ALL + killall NotificationCenter; Linux: clear the marker), so it does the right thing on whichever box the tmux server is on. Same action as skhd rctrl-esc, now also on a remote-safe chord.
bind / run-shell -b "~/.local/bin/notify-idle-clear.sh"

# ;-hold + t (ctrl+t) → sesh picker for the PLAIN tmux world — mirrors herdr's
# ctrl+t herdr-plus projects picker. skhd's rctrl-t is freed so ctrl+t reaches the
# multiplexer; in herdr (th passthrough tmux, no binds) ctrl+t goes to herdr instead.
bind -n C-t run-shell -b "~/.local/bin/sesh-switcher.sh"

# Window nav is single-chord ctrl+1..9 via PREFIX-EXPANSION, not a root binding:
# ghostty/kitty translate ctrl+<digit> into the two bytes `C-a <digit>` (prefix +
# digit), so it lands on the prefix-table `bind <digit>` below — identical to
# herdr, where ctrl+<digit> expands to `prefix <digit>` → switch_tab. This dodges
# the ctrl+digit encoding problem (no CSI-u leak into zsh-vi-mode) and is
# --remote-safe (just the native prefix flow). base-index 1 (top of file) makes
# `prefix 1` = FIRST window, matching herdr's 1-indexed tabs. prefix 0 closes all
# other windows (old skhd rctrl-0), keeping/focusing the first (:1).
bind 0 kill-window -a -t :=1

# skip "kill-pane 1? (y/n)" prompt; re-even surviving pure-axis panes, or restore
# the nvim 75/25 main-pane when a side-by-side row drops to 2 panes (auto)
bind-key x kill-pane \; run-shell 'bash ~/.config/tmux/lib/smart-split-layout.sh auto #{window_id}'
set -g detach-on-destroy off  # don't exit from tmux when closing a session

# other bindings
colorscheme_selector="~/.config/colorscheme/colorscheme-selector.sh"
# prefix 9 reclaimed for window-9 nav (single-chord ctrl+9 → prefix 9). Theme
# selector relocated to prefix C-t (also reachable from the `ql` launcher).
unbind 9
bind-key 9 select-window -t :=9
bind-key C-t run-shell "tmux neww -n '🎨 Theme' $colorscheme_selector"

run-shell 'tmux set -g popup-border-style "fg=$gnohj_color24"'

bind-key T run-shell "~/.config/tmux/toggle-terminal-transparency.sh"

# remove delay for exiting insert mode with ESC in Neovim
set -sg escape-time 10

# move tmux bar to top instead of bottom
set -g status-position top

# renumber windows if you close one
set -g renumber-windows on

setenv -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.config/tmux/plugins/"
set -g @tpm_plugins '             \
  tmux-plugins/tpm                \
  christoomey/vim-tmux-navigator  \
  Morantron/tmux-fingers#master   \
'

# Disable tmux-fingers wizard/welcome message
set -g @fingers-skip-wizard 1

# Match file names (anything after the last space)
set -g @fingers-pattern-0 '[a-zA-Z0-9][a-zA-Z0-9._-]*\.(sh|conf|md|json|yml|yaml|js|ts|py)$'

# Match numbers (file sizes, etc)
set -g @fingers-pattern-1 '[0-9]+\.[0-9]+[a-zA-Z]+'

# Match anything that looks like a filename
set -g @fingers-pattern-3 '[a-zA-Z0-9_-]+\.[a-zA-Z]{2,4}'

# Zero-out escape time delay for quicker response
set -s escape-time 3

bind s choose-tree -Zs -O time -F "#{session_windows}"

# Initialize TMUX plugin manager (keep this line at the very bottom, before colors)
run '~/.config/tmux/plugins/tpm/tpm'

# Generate and source tmux colors from active colorscheme
run-shell '~/.config/tmux/generate-tmux-colors.sh'
source-file ~/.config/tmux/tmux-colors.conf

# Use emoji based on the running command - configured from external file
source-file ~/.config/tmux/window-emojis.conf
set -g window-status-separator ' '

set-option -g focus-events on

# Single-row status bar (no empty spacer line): keeps the top pane border
# directly under the status line so it aligns with the tmux-dash sidebar's
# `sessions` separator (SIDEBAR_TOP_PAD=0). Was `status 2` + empty status-format[1].
set -g status on

# Use the user's default shell (from $SHELL environment variable)
# This allows tmux to respect whatever shell you're using (zsh, fish, etc.)
# Use login shell to ensure PATH is properly initialized (sources .zshrc)
set -g default-shell $SHELL
set -g default-command "${SHELL} -l"
