# kitty quick-access (quake) terminal — QL (launcher) variant
# https://sw.kovidgoyal.net/kitty/kittens/quick-access-terminal/
#
# A quake dedicated to `ql` (the launcher-quake.sh entry point, LAUNCHER_MODE=herdr).
# Toggled by skhd (cmd+rctrl+s). Independent from the yazi/plain quakes via
# `--instance-group ql`. Passed explicitly with `--config`, so it does NOT inherit
# the general quick-access-terminal.conf — everything lives here.

# Match the other kitty quakes / old ghostty quake: top edge, full width, ~26%
# screen height. `edge top` docks a full-width panel to the top (columns ignored
# for horizontal panels); height set by `lines`. kitty's `lines` has no percentage
# support (count or `Npx` only), so 370px (~26% of the 2560x1440 primary/external
# display). Fixed px, so it won't auto-adapt across displays.
edge top
lines 370px

# Auto-hide when you click away / focus another app (popup dismiss behavior).
hide_on_focus_loss yes

# Bare Escape resets the launcher to its root menu, THEN hides the quake — so the
# next open always lands on root instead of a stale submenu. The launcher process
# persists across hides (fast reopen), so without this a hide mid-submenu reopens
# there. `combine` runs both actions in order: first send a burst of Escapes to the
# launcher child, then hide the window.
#
# Why a BURST and not one Escape: the launcher's fzf-vim.sh is modal — in INSERT
# mode Esc only switches to NORMAL (a second Esc actually unwinds), and the deepest
# path (Themes › filtered) is two menu levels. So one Escape can't guarantee root.
# Six covers worst case (2 levels × up-to-2 Esc each + margin); extras are harmless
# — a root-menu Esc just redraws root, and only Ctrl+C ever exits ql. The child
# keeps reading the buffered Escapes and redraws root while hidden, so it's ready
# on the next open. Ctrl+C still tears ql down entirely.
kitty_override map escape combine : send_text all \x1b\x1b\x1b\x1b\x1b\x1b : hide_macos_app

# Slightly more opaque than the main window so overlaid text stays readable.
background_opacity 0.95
