#
# Terminal multiplexer — DEFAULT profile (base + agentic = the full daily driver).
# This file is deliberately thin: the config is split into composable layers so
# the same core can back three profiles selected by zsh aliases (see dot_zshrc):
#
#   tmux            → this file          = base.conf + agentic.conf  (agent HUD)
#   tn  → native.conf                    = base.conf                 (no agent HUD)
#   th  → herdr.conf (-L herdr socket)   = invisible host for the herdr client
#
# https://github.com/tmux/tmux

source-file ~/.config/tmux/base.conf
source-file ~/.config/tmux/agentic.conf

# Reload this profile (base + agentic) + regenerate colors.
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; source-file ~/.config/tmux/tmux-colors.conf \; display-message "Config reloaded"
