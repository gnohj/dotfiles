# ─── tmux native.conf ───────────────────────────────────────────────────────
# Clean personal tmux: the full base (prefix, splits, copy-mode, mouse, sesh
# click, colors, status bar, vim-tmux-navigator, tmux-fingers) WITHOUT the
# AI-agent / tmux-dash layer (no agent-status pane chips, no sesh fast-nvim
# hook, no gh-dash sweep, no sidebar-aware C-h, no Claude-prompt jump).
#
# Launch:  tn   (alias → tmux -f ~/.config/tmux/native.conf)

source-file ~/.config/tmux/base.conf

# Reload this profile + regenerate colors. `prefix r` is the sticky resize mode
# (base.conf), so reload lives on `prefix R`.
unbind R
# `-d 0` = no auto-timeout, so "Reloading..." persists through the reload + colorscheme regen instead of expiring after display-time; the final display-message replaces it the instant the reload finishes.
bind R display-message -d 0 "Reloading config..." \; source-file ~/.config/tmux/native.conf \; source-file ~/.config/tmux/tmux-colors.conf \; display-message "Native config reloaded"
