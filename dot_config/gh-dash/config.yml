# GitHub PR / issue dashboard - https://github.com/dlvhdr/gh-dash
# Theme block at bottom is generated by colorscheme-set.sh.
prSections:
  - title: My Pull Requests
    filters: is:open author:@me
  - title: Needs My Review
    filters: is:open review-requested:@me
  - title: Involved
    filters: is:open involves:@me -author:@me
  - title: All Open (web)
    filters: is:open repo:iheartradio/web
    limit: 20
  - title: All Open (inferno)
    filters: is:open repo:iheartradio/inferno-monorepo
    limit: 20
issuesSections:
  - title: My Issues
    filters: is:open author:@me
  - title: Assigned
    filters: is:open assignee:@me
  - title: Involved
    filters: is:open involves:@me -author:@me
defaults:
  preview:
    open: true
    width: 100
  prsLimit: 20
  issuesLimit: 20
  view: prs
  layout:
    prs:
      updatedAt:
        width: 7
      repo:
        width: 15
      author:
        width: 15
      assignees:
        width: 20
        hidden: true
      base:
        width: 15
        hidden: true
      lines:
        width: 16
    issues:
      updatedAt:
        width: 7
      repo:
        width: 15
      creator:
        width: 10
      assignees:
        width: 20
        hidden: true
  refetchIntervalMinutes: 30
# Every window is spawned via ~/.local/bin/mux-window.sh, which detects the live
# multiplexer and dispatches: tmux new-window on the Mac (off-herdr), or
# `herdr tab create` + `pane run` under herdr (where panes have no backing tmux
# server, so a bare `tmux new-window` silently fails). Backward compatible with
# both. See mux-window.sh for the tmux-vs-herdr command model.
keybindings:
  issues:
    - key: e
      name: 🐙 Edit issue in Octo (new window)
      command: >
        nohup $HOME/.local/bin/mux-window.sh "🐙 Issue #{{.IssueNumber}}" "{{.RepoPath}}" 'nvim --cmd "let g:zen_disabled=1" -c ":silent Octo issue edit {{.IssueNumber}}"' </dev/null >/dev/null 2>&1 &
    - key: i
      name: 🐙 Create issue in Octo (popup)
      command: >
        $HOME/.local/bin/mux-window.sh --popup "🐙 New Issue" "{{.RepoPath}}" 'nvim --cmd "let g:zen_disabled=1" -c ":silent Octo issue create"'
  prs:
    - key: P
      name: 🤖 Review PR - Octo + hunk + agent notes + ENHANCE
      command: >
        nohup bash $HOME/.config/gh-dash/review-open.sh full {{.PrNumber}} {{.RepoName}} {{.RepoPath}} </dev/null >/dev/null 2>&1 &
    - key: enter
      name: 🐙 Open PR in Octo (review branch)
      command: >
        nohup bash $HOME/.config/gh-dash/review-open.sh octo {{.PrNumber}} {{.RepoName}} {{.RepoPath}} </dev/null >/dev/null 2>&1 &
    - key: D
      name: 🔀 Open PR Diff in hunk (agent notes)
      command: >
        nohup bash $HOME/.config/gh-dash/review-open.sh diff {{.PrNumber}} {{.RepoName}} {{.RepoPath}} </dev/null >/dev/null 2>&1 &
    - key: E
      name: ✨ Open PR checks in ENHANCE
      command: >
        nohup bash $HOME/.config/gh-dash/review-open.sh enhance {{.PrNumber}} {{.RepoName}} {{.RepoPath}} </dev/null >/dev/null 2>&1 &
    - key: A
      name: 🤖 Run Claude /review on PR
      command: >
        nohup bash $HOME/.config/gh-dash/review-open.sh claude {{.PrNumber}} {{.RepoName}} {{.RepoPath}} </dev/null >/dev/null 2>&1 &
    - key: R # Reclaim idle TREEHOUSE review-pool slots only (leased ~/.treehouse worktrees whose review windows are closed). Does NOT touch your personal git worktrees.
      name: 🧹 Reclaim idle treehouse review slots (pool only, not personal worktrees)
      command: >
        nohup bash $HOME/.config/gh-dash/review-worktree.sh reclaim </dev/null >/dev/null 2>&1 &
repoPaths:
  gnohj/*: ~/Developer/*
  iheartradio/*: ~/Developer/*
  iheartradio/inferno-monorepo: ~/Developer/inferno/review/
  iheartradio/web: ~/Developer/web/review/
pager:
  diff: ""
# >>> colorscheme-set: gh-dash theme - generated, do not edit (see generate_gh_dash_config) >>>
theme:
  ui:
    table:
      showSeparator: true
      compact: false
  colors:
    text:
      primary: "#b8c9d3"
      secondary: "#a3b8c6"
      inverted: "#0f1419"
      faint: "#9fb7a4"
      warning: "#dab183"
      success: "#b7ce97"
      error: "#da858e"
    background:
      selected: "#536571"
    border:
      primary: "#a3b8c6"
      secondary: "#536571"
      faint: "#40474b"
# <<< colorscheme-set: gh-dash theme <<<
