# Profile: laptop — covers BOTH "laptop alone" and "laptop + HP 27er".
# Workspace Q is pinned to the HP 27er by name; when it isn't connected,
# aerospace gracefully falls back to the main display. Every other
# workspace is explicitly pinned to the built-in retina so placement
# stays stable across dock/undock. No separate "solo" profile needed.
#
# Spliced into aerospace.toml's [workspace-to-monitor-force-assignment]
# section by `aerospace-profile`.
A = '^built-in retina display$'
B = '^built-in retina display$'
C = '^built-in retina display$'
D = '^built-in retina display$'
E = '^built-in retina display$'
F = '^built-in retina display$'
G = '^built-in retina display$'
K = '^built-in retina display$'
L = '^built-in retina display$'
M = '^built-in retina display$'
R = '^built-in retina display$'
S = '^built-in retina display$'
T = '^built-in retina display$'
U = '^built-in retina display$'
V = '^built-in retina display$'
W = '^built-in retina display$'
X = '^built-in retina display$'
Z = '^built-in retina display$'
Q = '^HP 27er$'
