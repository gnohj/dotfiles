# kitty quick-access (quake) terminal
# https://sw.kovidgoyal.net/kitty/kittens/quick-access-terminal/
#
# Toggled by a global hotkey (skhd: cmd - s). The kitten is single-instance:
# each invocation shows/hides the same window. Runs as a plain kitty window
# with NO tmux/herdr in front of it, so the kitty graphics protocol (yazi image
# previews, image.nvim) works end-to-end here — unlike inside the herdr stack.

# Match the ghostty quake geometry: top edge, full width, ~35% screen height.
# `edge top` docks a full-width panel to the top of the screen (columns is
# ignored for horizontal panels), height set by `lines`. kitty's `lines` has NO
# percentage support — only a line count or an `Npx` pixel value — so we hard-set
# 370px (~26% of the 2560x1440 primary/external display). Unlike ghostty's `%`
# this is a FIXED pixel height: it won't auto-adapt if the built-in Retina panel
# becomes the active display. Retune the px value there if needed.
edge top
lines 370px

# Auto-hide when you click away / focus another app (popup dismiss behavior).
hide_on_focus_loss yes

# Dismiss with a keypress. `kitty_override map ...` applies ONLY to this quake
# instance, so normal kitty windows are unaffected. `hide_macos_app` hides kitty
# and returns focus to the previous app — popup-style dismissal (kitty here is
# quake-only; your main terminal is ghostty, so hiding the app == hiding the
# quake).
#
# CAVEAT: a bare `escape` binding is eaten before it reaches TUIs in the quake —
# yazi, nvim, and fzf all lose Escape. If you run yazi here (image previews),
# prefer the chord on the commented line instead and delete the escape line.
kitty_override map escape hide_macos_app
# kitty_override map cmd+escape hide_macos_app


# Slightly more opaque than the main window so overlaid text stays readable.
background_opacity 0.95
